services:
  - type: web
    name: whatsapp-bot
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm run start:web
    envVars:
      - key: APP_ROLE
        value: web
      - key: NODE_ENV
        value: production
      - key: RENDER
        value: true
      - key: DATABASE_URL
        fromDatabase:
          name: bot-whatsapp-db
          property: connectionString

databases:
  - name: bot-whatsapp-db
    engine: postgres
    plan: free
    ipAllowList: []
