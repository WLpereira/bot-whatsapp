services:
  - type: web
    name: whatsapp-bot
    env: node
    plan: free
    buildCommand: mkdir -p /opt/render/project/src/.cache/puppeteer; apt-get install -y --no-install-recommends libgbm1 libasound2 libatk1.0-0 libcups2 libdbus-1-3 libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 libxfixes3 libxrandr2 libglib2.0-0 libnss3 2>/dev/null || true; npm install; npx puppeteer browsers install chrome --path /opt/render/project/src/.cache/puppeteer
    startCommand: node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: RENDER
        value: true
      - key: PUPPETEER_SKIP_CHROMIUM_DOWNLOAD
        value: false
      - key: PUPPETEER_CACHE_DIR
        value: /opt/render/project/src/.cache/puppeteer
